task debugg {
    def eclipseExt = project.extensions.findByName('eclipse').jdt
    if (eclipseExt != null) {
        println "\n=== PROPERTIES ==="
        eclipseExt.properties.each { key, val ->
            println "Property: ${key} -> (${val?.getClass()?.name})"
        }

        println "\n===  METHODS ==="
        eclipseExt.class.metaClass.methods.each { method ->
            if (method.declaringClass.name.contains('Eclipse')) {
                println "Method: ${method.name}(${method.parameterTypes*.name.join(', ')})"
            }
        }
        println "===========================================\n"
        def processorJar = project(':processor').layout.buildDirectory.get().asFile
        println processorJar
        println new File(project(':processor').layout.buildDirectory.get().asFile, "libs").listFiles()?.find { it.name.endsWith('.jar') }
        println rootProject.layout.projectDirectory.file('.factorypath').asFile
        println "===========================================\n"
        
    } else {
        println "\n=== Not found ===\n"
    }
}
