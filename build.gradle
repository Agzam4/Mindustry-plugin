plugins {
    id 'java'
    id 'eclipse'
    id 'net.ltgt.apt-eclipse' version '0.21' // for apt
}

version '1.0'

base.archivesName = "Mindustry-plugin" 
sourceSets.main.java.srcDirs = ["src"]

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

eclipse {
    jdt {
        apt {
            aptEnabled = true
            genSrcDir = file('.apt_generated')
        }
    }
    synchronizationTasks 'eclipseJdtApt', 'eclipseFactorypath'
}

tasks.named('eclipseFactorypath') {
    doLast {
        def factorypathFile = file('.factorypath')
        if (factorypathFile.exists()) {
            def xml = new XmlParser().parse(factorypathFile)
            def processorJar = project(':processor').tasks.jar.archiveFile.get().asFile.absolutePath
            def exists = xml.factorypathentry.any { it.'@id' == processorJar }
            if (!exists) {
                xml.appendNode('factorypathentry', [
                    kind: 'EXTJAR', 
                    id: processorJar, 
                    enabled: true, 
                    runInBatchMode: false
                ])
                def printer = new XmlNodePrinter(new PrintWriter(new FileWriter(factorypathFile)))
                printer.print(xml)
            }
        }
    }
}
tasks.named('eclipseFactorypath').configure { dependsOn ':processor:jar' }

repositories{
    mavenCentral()
    maven{ url 'https://raw.githubusercontent.com/Zelaux/MindustryRepo/master/repository' }
    ivy{
        url 'https://github.com/'
        patternLayout{artifact '/[organisation]/[module]/releases/download/[revision]/dependencies.jar'}
        metadataSources{ artifact() }
    }
    ivy{
        url 'https://github.com/'
        patternLayout{artifact '/[organisation]/[module]/releases/download/master/[revision].jar'}
        metadataSources{ artifact() }
    }
    ivy{
        url 'https://github.com/'
        patternLayout{artifact '/[organisation]/[module]/releases/download/[revision]/jabel.jar'}
        metadataSources{ artifact() }
    }
}

ext{
    mindustryVersion = 'v157'
}

dependencies{    
	implementation project(':processor')
    annotationProcessor project(':processor')
	annotationProcessor 'com.google.auto.service:auto-service:1.1.1'
    
    compileOnly "Anuken:Mindustry:$mindustryVersion"
    implementation "org.telegram:telegrambots:6.9.7.1"
    implementation 'org.xerial:sqlite-jdbc:3.49.1.0'
}

jar{
    archiveFileName = "config/mods/${project.archivesBaseName}.jar"
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE 

    from{
        configurations.runtimeClasspath.collect{ it.isDirectory() ? it : zipTree(it) }
    }

    from(projectDir){
        include "plugin.json"
    }

    from("assets/"){
        include "**"
    }
}

eclipse {
    jdt {
        //apt {
        //    aptEnabled = true
        //   	genSrcDir = file('.apt_generated')
        //}
    }
}

